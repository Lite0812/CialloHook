[CialloLauncher]
# DebugMode: 调试模式（显示每一步的详细信息）
#   - true: 启用调试，显示消息框
#   - false: 禁用（默认）
DebugMode = true

TargetEXE = sorakoi.exe
TargetDLLCount = 1
TargetDLLName_0 = version.dll

# ==================== Locale Emulator 转区功能 ====================
[LocaleEmulator]
# Enable: 启用 Locale Emulator 转区功能
#   - true: 启用，自动注入 LE 并转换区域
#   - false: 禁用（默认）
Enable = false

# AnsiCodePage: ANSI 代码页
#   - 932: 日文 Shift-JIS（默认）
#   - 936: 简体中文 GBK
#   - 950: 繁体中文 Big5
AnsiCodePage = 932

# OemCodePage: OEM 代码页
OemCodePage = 932

# LocaleID: 区域标识符
#   - 0x411: 日文（默认）
#   - 0x804: 简体中文
#   - 0x404: 繁体中文
LocaleID = 0x411

# DefaultCharset: 默认字符集
#   - 128: 日文（默认）
#   - 134: 简体中文
#   - 136: 繁体中文
DefaultCharset = 128

# HookUILanguageAPI: 是否 Hook UI 语言 API
HookUILanguageAPI = 0

# Timezone: 时区设置
Timezone = Tokyo Standard Time
