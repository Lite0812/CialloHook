# ==================== Locale Emulator 转区 ====================
[LocaleEmulator]
# Enable: 是否启用转区
# proxy 模式下由 winmm.dll / version.dll 直接重启转区；loader 模式下继续由 CialloLauncher 处理
# 当前系统 ACP 已经等于目标 AnsiCodePage 时会自动跳过重启，避免重复转区
# 依赖支持 LEP 优先、LE 兜底：
#   - LEP: LoaderDll_x86.dll / LoaderDll_x64.dll + LocaleEmulatorPlus_x86.dll / LocaleEmulatorPlus_x64.dll
#   - LE : LoaderDll.dll + LocaleEmulator.dll
# 依赖可放在游戏目录 / CialloHook 目录，也可通过 [FilePatch] 的补丁目录或 CustomPak 提供
# 从补丁资源加载时会临时释放到缓存/游戏目录旁，重启后自动清理
# 示例：
#   Enable = true
Enable = false

# AnsiCodePage / OemCodePage: 目标区域代码页；一般两者保持一致
# 常见：
#   932(日文), 936(简中), 950(繁中)
# 示例：
#   AnsiCodePage = 932
#   OemCodePage = 932
AnsiCodePage = 932
OemCodePage = 932

# LocaleID: 区域 ID（十六进制）
# 常见：
#   0x411 = 日语(日本)
#   0x804 = 中文(中国)
#   0x404 = 中文(台湾)
# 示例：
#   LocaleID = 0x411
LocaleID = 0x411

# DefaultCharset: 默认字符集
# 常见：
#   128=SHIFTJIS_CHARSET
#   134=GB2312_CHARSET
#   136=CHINESEBIG5_CHARSET
# 与区域建议：
#   - 日文组合常见：932 + 0x411 + 128
#   - 简中组合常见：936 + 0x804 + 134
# 示例：
#   DefaultCharset = 128
DefaultCharset = 128

# HookUILanguageAPI: 是否 Hook UI 语言相关 API
#   0 = 关闭
#   1 = 启用
# 什么时候开 1：
#   - 游戏仍读取到系统 UI 语言，导致文本/资源分支不对
# 不确定时先 0，出问题再开 1 测试
# 示例：
#   HookUILanguageAPI = 1
HookUILanguageAPI = 0

# Timezone: 时区名称（需为系统可识别名称）
# 作用：部分游戏会按时区决定资源/活动时间/区域分支
# 常见值：
#   Tokyo Standard Time（东京）
#   China Standard Time（中国）
# 示例：
#   Timezone = Tokyo Standard Time
#   Timezone = China Standard Time
Timezone = Tokyo Standard Time


# ==================== 启动弹窗 ====================
[StartupMessage]
# Enable: 是否显示启动确认弹窗
# 用途：显示启动说明、免责声明、注意事项；用户点“是”后才继续放行游戏窗口
# 注意：
#   - 弹窗本身使用系统默认 MessageBox 字体，不参与字体 Hook
#   - 弹窗本身也不会参与文字替换与标题替换
#   - Author 和 Text 同时为空时，即使 Enable = true 也会自动关闭
Enable = false

# Style: 弹窗样式
# 取值：
#   1 = 默认旧版样式，只显示 Text
#   2 = 分段样式，显示 Author + Text
# 示例：
#   Style = 1
Style = 1

# Title: 弹窗标题
# 示例：
#   Title = 免责声明
Title = CialloHook

# Author: 作者署名，仅在 Style = 2 时显示在“【补丁作者】”段落
Author =

# Text: 正文，支持使用 \n 换行
# 说明：
#   - Style = 1 时：直接按旧版样式显示 Text
#   - Style = 2 时：显示在“【补丁声明】”段落
# 示例：
#   Text = 严禁倒卖和移植于任何平台,以及未经许可,\n禁止制作成整合包以及转载搬运至其他平台,\n请勿以任何方式,理由将本补丁用于商业目的,\n若因上述行为触犯法律,本人不承担任何责任
Text =


# ==================== 启动图片弹窗 ====================
[SplashImage]
# Enable: 是否启用启动图片弹窗
# 用途：启动时弹出图片动画窗口，动画结束后游戏窗口才会出现
# 图片查找顺序: patch文件夹 → cpk/xp3/lpk封包 → 游戏根目录
# 例如把 splash.png 丢进 patch/ 文件夹，或用 CialloPAK 打包进 patch.cpk / patch.lpk
# 如果找不到图片文件，会静默跳过，不影响游戏启动
# 示例：
#   Enable = true
Enable = false

# ImageFile: 图片文件名（不含路径，自动在 VFS 中查找）
# 支持 png/jpg/bmp/gif 等 GDI+ 可识别的主流图片格式
# 也支持 WebM 透明视频（VP8/VP9 + Alpha），格式通过魔术头自动识别
# WebM 若含 Vorbis 音频会自动同步播放（Win7 原生兼容）
# 文件名可任意命名，不限扩展名（如 splash.dat 只要内容是 WebM 就能识别）
#
# WebM 依赖: ciallo_webm.dll
# DLL 搜索顺序与素材文件一致: PatchFolder → CustomPak → 游戏根目录
# 可将 ciallo_webm.dll 放入 patch/ 文件夹或打包进 .cpk/.lpk 封包
#
# 示例：
#   ImageFile = splash.png
#   ImageFile = logo.jpg
#   ImageFile = splash.webm
#   ImageFile = opening.dat   # 内容是 WebM 也能识别
ImageFile = splash.png

# Width / Height: 图片弹出窗口尺寸（像素）
# 示例：
#   Width = 1024
#   Height = 768
Width = 800
Height = 600

# EntryEffect: 入场效果
#   1 = 淡入
#   2 = 旋转入场
#   3 = 破碎入场
#   4 = 缩放入场
#   5 = 百叶窗入场
#   6 = 像素化入场
# 示例：
#   EntryEffect = 2
EntryEffect = 1

# EntryMs: 入场动画时长（毫秒）
# 示例：
#   EntryMs = 1500
EntryMs = 1200

# HoldMs: 图片保持显示时长（毫秒）
# 示例：
#   HoldMs = 2000
HoldMs = 1800

# ExitEffect: 退场效果
#   1 = 淡出
#   2 = 旋转退场
#   3 = 破碎退场
#   4 = 缩放退场
#   5 = 百叶窗退场
#   6 = 像素化退场
# 提示：入场和退场可以自由搭配，6×6 = 36 种组合
# 例如 EntryEffect=1 + ExitEffect=3 → 淡入 + 破碎退场
# 示例：
#   ExitEffect = 3
ExitEffect = 1

# ExitMs: 退场动画时长（毫秒）
# 示例：
#   ExitMs = 1500
ExitMs = 1500

# DurationMs: 持续时间（毫秒）
# 0 = 自动（入场+保持+退场之和）
# > 0 = 强制覆盖总时长；如果比三段之和短，自动裁剪（优先保留入场，再保持，最后退场）
# 示例：
#   DurationMs = 3000
DurationMs = 0

# Position: 出现位置
#   1 = 居中（默认）
#   2 = 左上
#   3 = 右上
#   4 = 左下
#   5 = 右下
# 示例：
#   Position = 3
Position = 1

# InteractionMode: 交互模式
#   0 = 无交互（纯定时播放，默认）
#   1 = 可拖动图片（鼠标按住拖动窗口）
#   2 = 点击图片消失（点击后播放退场动画然后关闭）
# 示例：
#   InteractionMode = 1
InteractionMode = 0


# ==================== 加载模式 ====================
[LoadMode]
# Mode: 加载方式
#   proxy  = 代理模式（winmm/version，推荐）
#   loader = 启动器模式（由 CialloLauncher 注入）
# 原理：
#   - proxy：把本 DLL 伪装成系统 DLL，让游戏启动时自动加载
#   - loader：先启动 CialloLauncher，再由它创建进程并注入
# 怎么选：
#   - 新手优先 proxy（最省事）
#   - 需要多 DLL 或特殊启动参数时用 loader
# 示例：
#   Mode = proxy
Mode = proxy


# ==================== 启动器配置 ====================
[CialloLauncher]
# DebugMode: 启动器调试模式
# 开启后会输出启动与注入流程日志
# 示例：
#   DebugMode = true
DebugMode = false

# TargetEXE: 目标 EXE 名称或路径
# 规则：
#   - 可写文件名（game.exe）或完整路径
#   - 写文件名时默认在当前目录查找
# 示例：
#   TargetEXE = game.exe
#   TargetEXE = sorakoi.exe
TargetEXE = game.exe

# TargetDLLCount: 注入 DLL 数量
# 与 TargetDLLName_i 个数一致
# 新手建议：
#   - 先只注入 1 个确认稳定，再加其他 DLL
# 示例：
#   TargetDLLCount = 2
TargetDLLCount = 1

# TargetDLLName_i: 第 i 个注入 DLL
# 这是启动器的完整注入列表，不会自动追加 CialloHook.dll
# 加载顺序：按编号从小到大
# 常见用途：
#   - 需要 CialloHook 功能时显式写入 CialloHook.dll
#   - 也可以只写自己的插件 DLL，把启动器作为通用 DLL 启动器
# 示例：
#   TargetDLLName_0 = CialloHook.dll
#   TargetDLLName_1 = MyPatch.dll
TargetDLLName_0 = CialloHook.dll


# ==================== 延迟附加 ====================
[StartupTiming]
# AttachMode:
#   immediate  = 维持当前行为，初始化线程里直接完整挂钩
#   delay      = 等待 DelayMs 后再完整挂钩
#   entrypoint = 在 EXE 入口点首次执行时再完整挂钩
AttachMode = immediate

# DelayMs: 仅 AttachMode = delay 时有意义，建议先从 500~2000 试起
DelayMs = 0

# WaitForGuiReady: 是否在完整挂钩前等待 user32/gdi32 就绪
WaitForGuiReady = false

# EnableStartupWindowGate: delayed attach 时是否先隐藏早期窗口，待完整挂钩后再放行
EnableStartupWindowGate = false


# ==================== 调试日志 ====================
[Debug]
# Enable: 总日志开关
#   true  = 启用日志
#   false = 关闭日志
# 示例：
#   Enable = true
Enable = true

# LogToFile: 是否写入日志文件
# 一般输出到游戏目录或当前工作目录
# 小白建议：排障时开，日常可开可关
# 示例：
#   LogToFile = true
LogToFile = true

# LogToConsole: 是否输出到控制台窗口
# 控制台窗口会影响全屏游戏体验，日常通常关闭
# 但排障时打开更直观
# 示例：
#   LogToConsole = false
LogToConsole = true
