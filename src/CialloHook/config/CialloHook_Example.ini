# ==================== 窗口标题替换 ====================
[WindowTitle]
# ReplaceCount: 标题替换规则数量
# 示例：
#   ReplaceCount = 1
ReplaceCount = 0

# ReadEncoding: 读取 ANSI 标题时使用的编码
# WriteEncoding: 写回新标题时使用的编码
# 如果不区分读写，也可以继续只写旧字段 Encoding
# 示例：
#   ReadEncoding = 936
#   WriteEncoding = 936
ReadEncoding = 936
WriteEncoding = 936
# EnableVerboseLog: 标题详细日志开关
# 用途：
#   打开后记录所有进入标题 Hook 链路的窗口标题，并做折叠显示
#   同一条标题默认只记录一次；命中替换时也会记录折叠后的命中结果
# 示例：
#   EnableVerboseLog = true
EnableVerboseLog = false
# Encoding = 936

# Original_i / New_i: 标题替换规则
# 规则说明：
#   Original_i 支持 * 与 ? 通配符，命中后替换为 New_i
# 通配符示例：
#   Original_0 = *体験版*     ; 标题里含“体験版”就替换
#   Original_1 = Demo?        ; Demo1/Demo2 命中，Demo10 不命中
# 注意：
#   - New_i 可以是空字符串（清空标题）
#   - 多条规则同时命中时，按编号从小到大处理
# 示例：
#   Original_0 = *体験版*
#   New_0 = 正式版
# Original_0 =
# New_0 =

# TitleMode: 标题替换模式
#   0 = API Hook 模式（CreateWindowEx/SetWindowText）
#   1 = 事件监听模式（WinEvent）
#   2 = 混合模式（推荐）
# 示例：
#   TitleMode = 2
TitleMode = 2


# ==================== 防截图 / 防录屏 ====================
[ScreenCaptureProtection]
# Enable: 是否启用屏幕捕获保护
# 用途：对当前注入进程拥有的顶层窗口调用 Windows SetWindowDisplayAffinity
# 注意：
#   - 这是隐私保护选项，不是 DRM，不能保证阻止所有捕获方式
#   - 不能阻止外部摄像头、采集卡、驱动/内核级捕获或所有第三方工具
#   - 开启后截图、录屏、OBS/直播捕获出现黑屏或窗口缺失属于预期效果
# 示例：
#   Enable = true
Enable = false

# Mode: 保护模式
#   exclude = 优先使用 WDA_EXCLUDEFROMCAPTURE，Windows 10 2004+ / Windows 11 支持较好
#   monitor = 使用 WDA_MONITOR，兼容性更高，捕获时通常显示黑色
# 示例：
#   Mode = exclude
Mode = exclude

# FallbackToMonitor: exclude 模式失败时是否自动退回 monitor
FallbackToMonitor = true

# ApplyExistingWindows: 启用后是否立即处理已经存在的游戏窗口
ApplyExistingWindows = true

# ProtectToolWindows: 是否保护 WS_EX_TOOLWINDOW 工具窗口/启动图窗口
# 默认 false，避免把 CialloHook 自己的 splash/helper 窗口也纳入保护
ProtectToolWindows = false

# ProtectOwnedWindows: 是否保护 owned popup/dialog
# 默认 false，仅保护主要顶层窗口；如游戏大量使用 owned 弹窗可改 true
ProtectOwnedWindows = false

# EnableVerboseLog: 输出详细筛选和应用日志，排查问题时再开启
EnableVerboseLog = false


# ==================== 文件热补丁 ====================
[FilePatch]
# Enable: 是否启用补丁目录优先读取
# 用途：让“补丁目录/补丁封包”里的同名文件覆盖游戏原始文件
# 原理（小白版）：
#   游戏请求读取 A 文件时，先查补丁，再回退原文件
#   查找顺序大致是：PatchFolder -> CustomPak -> 原始文件
# 典型用途：
#   - 汉化资源覆盖（图片、脚本、文本）
#   - MOD 替换（UI、音频、配置）
# 示例：
#   Enable = true   ; 开启补丁系统
Enable = true

# PatchFolderCount: 补丁目录数量
# 与 PatchFolderName_i 个数一致，编号从 0 开始且必须连续
# 新手规则：
#   - Count = 1 只写 PatchFolderName_0
#   - Count = 2 必须写 PatchFolderName_0 和 PatchFolderName_1
# 示例：
#   PatchFolderCount = 2
PatchFolderCount = 1

# PatchFolderName_i: 补丁目录
# 优先级：编号越大优先级越高（后面的覆盖前面）
# 路径建议：
#   - 推荐相对路径（相对游戏目录），如 patch、mods\cn
#   - 可写绝对路径，但迁移到别的电脑不方便
# 多目录示例（高优先级放后面）：
#   PatchFolderName_0 = patch_base
#   PatchFolderName_1 = patch_cn
#   PatchFolderName_2 = patch_hotfix
# 示例：
#   PatchFolderName_0 = patch
#   PatchFolderName_1 = patch_override
PatchFolderName_0 = patch

# CustomPakEnable: 是否启用自定义封包（cpk/xp3/lpk）
# 用途：除补丁目录外，再额外读取你提供的 CPK/XP3/LPK 封包
# 原理：和补丁目录一样做“覆盖查找”，只是数据源变成封包
# 示例：
#   CustomPakEnable = true
CustomPakEnable = true

# CustomPakCount: 封包数量
# 与 CustomPakName_i 个数一致，编号从 0 连续
# 新手建议：先从 1 个封包开始，确认生效后再叠加多个
# 示例：
#   CustomPakCount = 2
CustomPakCount = 1

# CustomPakName_i: 封包文件名或路径
# 优先级：编号越大优先级越高
# 支持：
#   - 文件名（如 patch.cpk / patch.xp3 / patch.lpk，默认在游戏目录找）
#   - 相对路径（如 .\mods\patch.cpk / .\mods\patch.lpk）
#   - 绝对路径（如 D:\mods\patch.cpk / D:\mods\patch.lpk）
# 叠加示例：
#   CustomPakName_0 = patch_base.cpk
#   CustomPakName_1 = patch_cn.cpk
#   CustomPakName_2 = patch_hotfix.cpk
# 示例：
#   CustomPakName_0 = patch.cpk
# 也可使用 LitePAK v6：CustomPakName_0 = patch.lpk；若需要目录枚举，请同时放置 manifest（如 patch_manifest.txt）
#   CustomPakName_1 = patch_hd.cpk
CustomPakName_0 = patch.cpk

# VFSMode: 封包读取模式
#   0 = 物理读取模式（更接近真实文件）
#   1 = 内存读取模式（由内存映射返回）
# 该怎么选：
#   - 不确定时先用 0（兼容优先）
#   - 追求性能或有特殊需求再尝试 1
# 常见现象：
#   - 某些游戏在退出阶段对内存句柄更敏感，0 往往更稳
# 示例：
#   VFSMode = 0
VFSMode = 1

# EnableLog: FilePatch 日志开关
# 用途：输出“命中了哪个补丁文件/封包文件”的日志
# 何时开启：
#   - 你明明放了补丁但游戏没生效
#   - 想确认最终读到的是哪个文件
# 示例：
#   EnableLog = true
EnableLog = false

# DebugMode: FilePatch 调试模式
# 用途：比 EnableLog 更详细，包含更多内部决策信息
# 建议：仅排障时短期开启，日常关闭避免日志过大
# 示例：
#   DebugMode = true
DebugMode = false


# ==================== x64dbg .1337 内存补丁 ====================
[BinaryPatch]
# Enable: 是否启用 x64dbg .1337 字节补丁
# 用途：启动后按 .1337 文件中的模块 RVA 写入 NEW 字节，适合迁移 x64dbg 1337 补丁
# 格式：
#   >game.exe
#   001CDB04:CC->B8
#   001CDB05:CC->00
#   >scn.dll
#   002CDB04:CC->90
# 说明：
#   - >xxx.exe 表示主 EXE，实际使用 GetModuleHandle(NULL)
#   - >xxx.dll 表示已加载 DLL，使用 GetModuleHandleW
#   - 地址按模块基址 + RVA 计算
#   - 默认忽略 OLD 字节，不做恢复
#   - DLL 必须在应用补丁时已经加载；延迟加载 DLL 后续可再扩展
#   - 补丁文件可放本地磁盘，也可放进已启用的 CustomPak 中
Enable = false

# PatchFileCount / PatchFileName_i: .1337 文件列表，编号从 0 开始连续
# 路径可为相对游戏目录或绝对路径；放进 CustomPak 时仍写游戏相对路径
PatchFileCount = 0
# PatchFileName_0 = patches\main.1337

# EnableLog: 输出详细解析和写入日志
EnableLog = false

# VerifyOldBytes: 写入前是否校验 OLD 字节
# false = 兼容 translate-tools-main，忽略 OLD
# true  = OLD 不匹配时跳过该连续块并记录警告
VerifyOldBytes = false

# PreferCustomPak: 同一路径本地文件和 CustomPak 条目都存在时，是否优先使用 CustomPak
PreferCustomPak = true

# FailOnMissingModule / FailOnWriteError: 是否在模块缺失或写入失败时停止后续补丁
FailOnMissingModule = false
FailOnWriteError = false

# EnableHWBP: 是否启用硬件断点触发
# 先在当前线程设置 DR0 执行断点，attach/entrypoint/runtime 任一阶段命中后再应用 .1337
EnableHWBP = false
# HWBPModule / HWBPRVA: 自定义断点模块/RVA；留空或 RVA=0 时，默认使用第一个 .1337 补丁地址
# HWBPModule = siglusengine.exe
# HWBPRVA = 002BEB0A


# ==================== 文件欺骗 ====================
[FileSpoof]
# Enable: 是否启用文件/目录欺骗
# 原理：拦截文件访问 API，命中规则后“伪装成不存在”
# 适用场景：
#   - 屏蔽某些会触发报错的文件
#   - 隐藏不希望被游戏读取的资源
#   - 临时绕过某些探测逻辑（需自行评估风险）
# 示例：
#   Enable = true
Enable = false

# SpoofFileCount: 伪装文件数量
# 与 SpoofFileName_i 个数一致
# 规则同上：编号必须连续，不能跳号
# 示例：
#   SpoofFileCount = 1
SpoofFileCount = 0

# SpoofFileName_i: 需要隐藏的文件路径
# 建议使用相对路径，统一用 \ 或 / 均可
# 示例场景：
#   - 隐藏授权文件：system\license.dat
#   - 隐藏特定 DLL：plugins\debug_overlay.dll
# 示例：
#   SpoofFileName_0 = system\license.dat
# SpoofFileName_0 =

# SpoofDirectoryCount: 伪装目录数量
# 与 SpoofDirectoryName_i 个数一致
# 目录命中后，该目录下文件访问也会受影响
# 示例：
#   SpoofDirectoryCount = 1
SpoofDirectoryCount = 0

# SpoofDirectoryName_i: 需要隐藏的目录路径
# 示例场景：
#   SpoofDirectoryName_0 = system\secret
#   SpoofDirectoryName_1 = cache\telemetry
# 示例：
#   SpoofDirectoryName_0 = system\secret
# SpoofDirectoryName_0 =

# EnableLog: FileSpoof 日志开关
# 建议：配置规则时先开，确认命中后再关
# 示例：
#   EnableLog = true
EnableLog = false


# ==================== 目录重定向 ====================
[DirectoryRedirect]
# Enable: 是否启用目录重定向
# 用途：将游戏访问的原目录整体改写到另一个目录，适合存档迁移、多开隔离、免权限写入
# 原理：命中规则后，把“原目录及其子路径”的访问重定向到目标目录
# 示例：
#   Enable = true
Enable = false

# EnableLog: DirectoryRedirect 日志开关
# 建议：首次配置或排障时开启，确认命中规则后再关闭
# 示例：
#   EnableLog = true
EnableLog = false

# RuleCount: 重定向规则数量
# 与 Rule_i 个数一致，编号从 0 开始且必须连续
# 示例：
#   RuleCount = 2
RuleCount = 0

# Rule_i: 目录重定向规则
