HookCreateFontIndirectExW = true
HookGetObjectA = true
HookGetObjectW = true
HookGetTextFaceA = true
HookGetTextFaceW = true
HookGetTextMetricsA = true
HookGetTextMetricsW = true
HookGetCharABCWidthsA = true
HookGetCharABCWidthsW = true
HookGetCharABCWidthsFloatA = true
HookGetCharABCWidthsFloatW = true
HookGetCharWidthA = true
HookGetCharWidthW = true
HookGetCharWidth32A = true
HookGetCharWidth32W = true
HookGetKerningPairsA = true
HookGetKerningPairsW = true
HookGetOutlineTextMetricsA = true
HookGetOutlineTextMetricsW = true
HookAddFontResourceA = true
HookAddFontResourceW = true
HookAddFontResourceExA = true
HookAddFontMemResourceEx = true
HookRemoveFontResourceA = true
HookRemoveFontResourceW = true
HookRemoveFontResourceExA = true
HookRemoveFontMemResourceEx = true
HookEnumFontsA = true
HookEnumFontsW = true
HookEnumFontFamiliesA = true
HookEnumFontFamiliesW = true
HookEnumFontFamiliesExA = true
HookEnumFontFamiliesExW = true
HookGetCharWidthFloatA = true
HookGetCharWidthFloatW = true
HookGetCharWidthI = true
HookGetCharABCWidthsI = true
HookGetTextExtentPointI = true
HookGetTextExtentExPointI = true
HookGetFontData = true
HookGetFontLanguageInfo = true
HookGetFontUnicodeRanges = true
HookDWriteCreateFactory = true
HookGdipCreateFontFamilyFromName = true
HookGdipCreateFontFromLogfontW = true
HookGdipCreateFontFromLogfontA = true
HookGdipCreateFontFromHFONT = false
HookGdipCreateFontFromDC = true
HookGdipCreateFont = true
HookGdipDrawString = true
HookGdipDrawDriverString = true
HookGdipMeasureString = true
HookGdipMeasureCharacterRanges = true
HookGdipMeasureDriverString = true
