PatchFolderCount = 1
PatchFolderName_0 = patch

# EnableLog: 输出单文件命中/未命中的详细日志；排查资源名时再开启
EnableLog = false

# HookExistsCheck: 同时 Hook 资源存在性检查；部分游戏需要，默认关闭更稳
HookExistsCheck = false

# MaxFileSize: 允许替换的最大松散文件大小（字节）；超过则回退 ALD 原资源
MaxFileSize = 268435456



[RioShiina]
# RioShiina 引擎资源覆盖 / WARC 解包
# Mode:
#   0 = 关闭
#   1 = 资源覆盖（按 basename 在 PatchName_i 中查找同名文件）
#   2 = 解包指定 WARC（需在 ArchivesToExtract 中填写目标封包）
# 注意：
#   - 当前仅支持 x86 目标
#   - Mode 1 会复用 [FilePatch] 的补丁目录和 custom CPK 作为补丁来源
