PatchName_0 = unencrypted
ExtractOutputDir = rio_extract
ArchivesToExtract = data.warc|voice.warc
SkipInvalidFileName = true
# 自动处理 Rio 注册表检测；会扫描同目录 ini 里的“椎名里緒*” section
ProcessReg = true
# 自动处理 Rio DVD 检测；SpecDvdFileSize=0 时仅改写盘符到 W:\
ProcessDvd = false
SpecDvdFileSize = 0
EnableLog = false

