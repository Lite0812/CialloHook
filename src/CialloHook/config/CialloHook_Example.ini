#   - 原路径建议写绝对路径，推荐配合环境变量
#   - 目标文件夹可写绝对路径，也可写相对路径
#   - 相对路径按游戏目录解析，例如 savedata -> 游戏目录\savedata
#   - 命中后会把该目录下所有子文件/子目录一起重定向
# 支持的环境变量：
#   %SAVEDGAMES% = C:\Users\用户名\Saved Games
#   %DOCUMENTS% = C:\Users\用户名\Documents
#   %APPDATA% = C:\Users\用户名\AppData\Roaming
#   %LOCALAPPDATA% = C:\Users\用户名\AppData\Local
#   %USERPROFILE% = C:\Users\用户名
# 示例：
#   Rule_0 = %APPDATA%\GameCompany\GameName:savedata
# Rule_0 =

# ==================== 虚拟注册表 ====================
[Registry]
# Enable: 是否启用虚拟注册表
# 用途：把外部 .reg 文件加载到进程内虚拟层，避免往系统注册表真实写入
# 适用：需要读取安装目录、安装源、序列号等注册表项的免安装游戏
# 示例：
#   Enable = true
Enable = false

# FileCount: 注册表文件数量
# 与 FileName_i 个数一致，编号从 0 开始且必须连续
# 示例：
#   FileCount = 2
FileCount = 1

# FileName_i: .reg 文件路径
# 多文件按顺序叠加，后加载的同名项可覆盖前者
# 要求：
#   1) 必须是标准 Windows Registry Editor Version 5.00 导出格式
#   2) 编码必须为 UTF-16LE
#   3) 相对路径按游戏目录解析
# 示例：
#   FileName_0 = base.reg
#   FileName_1 = config\will\override.reg
FileName_0 = game.reg

# EnableLog: 虚拟注册表日志开关
# 建议：首次接入时开启，确认命中后再关闭
# 示例：
#   EnableLog = true
EnableLog = false

# ==================== RegistryBootstrap 临时注册表引导 ====================
[RegistryBootstrap]
# Enable: 是否启用真实注册表临时引导
# 用途：在进程启动时创建真实注册表键值，退出时按 CleanupOnExit 回滚
Enable = false

# CleanupOnExit: 进程退出时是否恢复 / 删除本次写入的键值
CleanupOnExit = true

# EnableLog: 是否输出详细日志
EnableLog = false

# RuleCount: 规则数量
RuleCount = 0

# 每条规则包含：Root_i / Key_i / ValueName_i / Type_i / Data_i
# 当前支持 Type_i = SZ / DWORD
# 示例：
#   Root_0 = HKCU
#   Key_0 = Software\\Vendor\\Game
#   ValueName_0 = InstallPath
#   Type_0 = SZ
#   Data_0 = .\\
#   Root_1 = HKCU
#   Key_1 = Software\\Vendor\\Game
#   ValueName_1 = Type
#   Type_1 = DWORD
#   Data_1 = 0

# 最小示例（game.reg 内容）：
#   Windows Registry Editor Version 5.00
#
#   [HKEY_CURRENT_USER\Software\Will]
#   [HKEY_CURRENT_USER\Software\Will\Unskort]
#   "InstallDir"="."
#   "InstallSrc"="."
#
# ==================== 引擎专属配置 ====================
[SiglusKeyExtract]
# Enable: 是否启用 Siglus 密钥提取
# 用途：自动提取 SiglusEngine 常见的 16 字节 XOR 密钥
# 原理（简化）：
#   监控 Gameexe.dat 读取过程，在解密后的关键位置抓取密钥数据
# 适用：仅 SiglusEngine 游戏；非该引擎开启通常无意义
# 示例：
