# CialloHook 配置示例文件（详细说明版）
# 将本文件复制或重命名为 CialloHook.ini 后使用
# 目标风格：每个选项都包含“用途 + 取值建议 + 示例”

# ==================== 字体配置 ====================
[CialloHook]
# Charset: 字符集编码（十六进制）
# 用途：强制字体创建时使用指定字符集，常用于日文游戏汉化后修复乱码
# 常用值：
#   0x00 = DEFAULT_CHARSET（默认，跟随原程序）
#   0x80 = SHIFTJIS_CHARSET（日文）
#   0x86 = GB2312_CHARSET（简中）
#   0x88 = CHINESEBIG5_CHARSET（繁中）
# 示例：
#   Charset = 0x86
Charset = 0x00

# EnableCharsetSpoof: 启用字符集伪装
# 用途：仅当游戏请求的原始字符集等于 SpoofFromCharset 时，替换为 SpoofToCharset
# 区别：
#   - Charset 非 0：无条件强制覆盖为 Charset
#   - EnableCharsetSpoof = true：仅按来源字符集命中后替换
# 优先级：如果 Charset 非 0，仍以 Charset 的强制覆盖为准
# 示例：
#   EnableCharsetSpoof = true
EnableCharsetSpoof = false
# 旧写法兼容：
#   EnableCodepageSpoof = true   ; 与 EnableCharsetSpoof 等效

# SpoofFromCharset: 需要伪装的源字符集
# 常用值：
#   0x80 = SHIFTJIS_CHARSET（日文）
#   0x86 = GB2312_CHARSET（简中）
# 示例：
#   SpoofFromCharset = 0x80
SpoofFromCharset = 0x80

# SpoofToCharset: 伪装后的目标字符集
# 常用值：
#   0x01 = DEFAULT_CHARSET
#   0x86 = GB2312_CHARSET（简中）
# 示例：
#   SpoofToCharset = 0x01
SpoofToCharset = 0x01

# Font: 字体名称或字体文件路径（智能识别）
# 用途：指定替换字体；留空表示不替换字体
# 写法：
#   1) 系统字体名称：SimHei / Microsoft YaHei / SimSun / NSimSun
#   2) 字体文件路径：C:\Fonts\MyFont.ttf / .\fonts\MyFont.otf
#   3) 中文字体名：如“黑体”“微软雅黑”（不推荐，部分系统/游戏会失败）
#     示例: Font = SimHei          # 黑体的英文名称（推荐）
#     示例: Font = 黑体             # 中文名称（可能不生效）
#     示例: Font = Microsoft YaHei # 微软雅黑
#     示例: Font = SimSun          # 宋体
#     示例: Font = NSimSun         # 新宋体
# 智能识别规则：
#   - 以 .ttf/.otf/.ttc/.otc/.fon/.fnt 结尾时，按字体文件处理
#   - 其他情况按系统字体名处理
# 注意事项（小白必看）：
#   1. 系统字体优先写英文名，兼容性最好
#   2. 使用外部字体文件时，只在当前游戏进程私有加载，不会安装到系统
#   3. 如果字体文件能加载但不生效，通常是 FontName 没填对
#   4. 路径里有空格可以直接写，不用加引号
# 示例：
#   Font = SimHei                    ; 系统字体（推荐）
#   Font = Microsoft YaHei           ; 系统字体（推荐）
#   Font = 黑体                       ; 中文名（可能不生效）
#   Font = .\fonts\SourceHanSansCN-Regular.otf
#   Font = C:\Fonts\MyFont.ttf
Font = SimHei

# FontName: 外部字体“实际名称”（可选）
# 用途：当字体文件名和字体内部名称不一致时手动指定
# 典型场景：文件名为 abc.otf，但字体内部名是 Source Han Sans CN
# 怎么判断要不要填：
#   - 字体替换无效、但文件路径正确时，基本就要填
#   - 同一个字体文件在不同查看器里看到的“字体家族名”通常就是它
# 示例：
#   Font = .\fonts\abc.otf
#   FontName = Source Han Sans CN Regular
# FontName =

# SkipFontCount / SkipFontName_i: 跳过指定原始字体名
# 用途：当游戏请求这些字体时，完全不套用当前字体 Hook 规则
# 说明：
#   - 支持多条，编号从 0 开始连续
#   - 大小写不敏感
#   - 优先级高于下面的重定向规则
# 示例：
#   SkipFontCount = 2
#   SkipFontName_0 = MS Gothic
#   SkipFontName_1 = Arial
SkipFontCount = 0
# SkipFontName_0 =

# RedirectFontCount / RedirectFromFont_i / RedirectToFont_i: 定向重定向字体
# 用途：仅当游戏请求指定原始字体时，改为另一个目标字体
# 目标字体写法：
#   - 系统字体名：Microsoft YaHei / SimHei
#   - 字体文件路径：.\fonts\SourceHanSansCN-Regular.otf
# RedirectToFontName_i:
#   - 可选，仅当目标是字体文件且内部字体名称与文件名不同才需要
# 说明：
#   - 支持多条，编号从 0 开始连续
#   - 大小写不敏感
#   - 若与 SkipFontName_i 同时命中，以跳过为准
# 示例：
#   RedirectFontCount = 2
#   RedirectFromFont_0 = MS UI Gothic
#   RedirectToFont_0 = Microsoft YaHei
#   RedirectFromFont_1 = Arial
#   RedirectToFont_1 = .\fonts\SourceHanSansCN-Regular.otf
#   RedirectToFontName_1 = Source Han Sans CN Regular
RedirectFontCount = 0
# RedirectFromFont_0 =
# RedirectToFont_0 =
# RedirectToFontName_0 =

# UnlockFontSelection: 字体选择解锁
# 用途：控制字体枚举时是否放开过滤
#   true  = 不按 Charset/Font 限制枚举结果，列表更全
#   false = 按当前配置约束枚举结果
# 注意：此项只在枚举相关 Hook 开启时生效
# 示例：
#   UnlockFontSelection = true
UnlockFontSelection = true

# FontHeight: 固定字体高度
# 取值：
#   <0 = 字符高度（推荐，如 -16）
#   >0 = 单元高度
#   =0 = 不固定（可配合 FontScale）
# 注意：FontHeight != 0 时，FontScale 不生效
# 示例：
#   FontHeight = -18
FontHeight = 0

# FontWidth: 固定字体宽度
# 取值：
#   >0 = 强制固定宽度
#   =0 = 不固定，沿用原始宽度逻辑
# 注意：固定宽度过大可能导致拥挤或截断
# 示例：
#   FontWidth = 0
FontWidth = 0

# FontScale: 字体整体缩放倍数
# 用途：按原始字体大小比例缩放，保留 UI 各处相对大小关系
# 常用值：
#   1.0 = 不缩放
#   1.2 = 放大 20%
#   0.9 = 缩小 10%
# 注意：
#   - FontHeight/FontWidth 有任一非 0 时，优先固定值
#   - 建议先用 FontScale，再做细调
# 示例：
#   FontScale = 1.25
FontScale = 1.0

# FontSpacingScale: 字间距缩放倍数（只调字距，不直接拉伸字形）
# 常用值：
#   1.0 = 不改
#   1.1 = 略加宽
#   0.95 = 略收紧
# 示例：
#   FontSpacingScale = 1.1
FontSpacingScale = 1.0

# FontWeight: 字重
# 常用值：
#   0   = 不改
#   400 = 常规
#   700 = 粗体
# 示例：
#   FontWeight = 700
FontWeight = 0

# GlyphAspectRatio: 字形宽高比
# 用途：在大小调整后继续微调字形横向比例
#   1.0 = 不改
#   >1  = 更宽
#   <1  = 更窄
# 示例：
#   GlyphAspectRatio = 1.08
GlyphAspectRatio = 1.0

# GlyphOffsetX: 字形 X 偏移（像素）
# 正数右移，负数左移
# 示例：
#   GlyphOffsetX = 1
GlyphOffsetX = 0

# GlyphOffsetY: 字形 Y 偏移（像素）
# 正数上移，负数下移
# 示例：
#   GlyphOffsetY = -1
GlyphOffsetY = 0

# MetricsOffsetLeft: 左侧度量补偿
# 正数=增加左留白，负数=减少左留白
# 示例：
#   MetricsOffsetLeft = 1
MetricsOffsetLeft = 0

# MetricsOffsetRight: 右侧度量补偿
# 正数=增加右留白，负数=减少右留白
# 示例：
#   MetricsOffsetRight = -1
MetricsOffsetRight = 0

# MetricsOffsetTop: 顶部度量补偿
# 示例：
#   MetricsOffsetTop = 1
MetricsOffsetTop = 0

# MetricsOffsetBottom: 底部度量补偿
# 示例：
#   MetricsOffsetBottom = -1
MetricsOffsetBottom = 0

# EnableCnJpMap: 启用日繁到简中映射（默认关闭）
# 用途：
#   读取 CnJpMapJson 中的 "左值": "右值" 映射
#   当字体要取右值字符的字形/字宽时，改为使用左值字符的字形/字宽
# 示例：
#   json 中 "头": "頭" ，则渲染 "頭" 时会改取 "头" 的字形
# 注意：
#   - 该功能在现有 Replacement_i 规则之后检查；若命中文字替换规则，则该条文本不再做日繁映射
#   - 当前按单字符映射生效，建议 json 保持 "单字": "单字" 形式
#   - 建议 json 使用 UTF-8 BOM/UTF-8 或 UTF-16LE BOM
#   - 如需自定义路径，可写相对游戏目录路径或绝对路径
#   - 现在归属字体模块，建议写在 [CialloHook] 段
# 示例：
#   EnableCnJpMap = true
EnableCnJpMap = false

# CnJpMapVerboseLog: 输出日繁映射详细调试日志（默认关闭）
# 用途：
#   记录文本链路里实际看到的文字、A/W 路径、读写代码页、ANSI 原始字节预览
#   以及字形映射是否命中、是否因解码/编码失败而未替换
# 注意：
#   - 仅建议排查问题时临时开启，日志量会明显增大
#   - 兼容旧配置，也可写在 [TextReplace] 段
# 示例：
#   CnJpMapVerboseLog = true
CnJpMapVerboseLog = false

# CnJpMapJson: 映射 json 路径
# 默认值：
#   CnJpMapJson = subs_cn_jp.json
# 示例：
#   CnJpMapJson = .\text\subs_cn_jp.json
CnJpMapJson = subs_cn_jp.json

# CnJpMapReadEncoding: 日繁映射专用代码页
# 用途：
#   仅影响日繁映射的 ANSI 文本解码/回写，不影响 TextReplace 自身规则匹配
# 默认行为：
#   - 未填写时，自动沿用 [TextReplace] 的 ReadEncoding
# 兼容写法：
#   - 也支持旧式单值 CnJpMapEncoding，等价于设置同一个读取代码页
#   - 旧的 CnJpMapWriteEncoding 会被当作 CnJpMapReadEncoding 的兼容别名读取
# 示例：
#   CnJpMapReadEncoding = 932
CnJpMapReadEncoding = 0

# ==================== 字体 Hook 分组开关 ====================
# HookGroupCreate: 字体创建链路
# 覆盖 CreateFont/CreateFontIndirect/CreateFontIndirectEx 等入口
# 示例：
#   HookGroupCreate = true
HookGroupCreate = true

# HookGroupEnumerate: 字体枚举链路
# 覆盖 EnumFonts/EnumFontFamilies/EnumFontFamiliesEx 等
# 示例：
#   HookGroupEnumerate = true
HookGroupEnumerate = true

# HookGroupMetrics: 字体度量链路
# 覆盖 GetTextMetrics/GetCharWidth*/GetFontUnicodeRanges 等
# 示例：
#   HookGroupMetrics = true
HookGroupMetrics = true

# HookGroupResource: 字体资源链路
# 覆盖 Add/RemoveFontResource* 与 Add/RemoveFontMemResourceEx
# 示例：
#   HookGroupResource = true
HookGroupResource = true

# HookGroupModern: 现代字体链路
# 覆盖 DWrite 与 GDI+ 相关创建/测量接口
# 示例：
#   HookGroupModern = true
HookGroupModern = true

# HookGroupLateLoad: 延迟加载补钩链路
# 当 dwrite/gdiplus 在运行中才加载时自动补挂 Hook
# 示例：
#   HookGroupLateLoad = true
HookGroupLateLoad = true

# ==================== 单 API 开关（不写则跟随分组） ====================
# 完整列表如下（含全部可配置键）：
HookCreateFontA = true
HookCreateFontIndirectA = true
HookCreateFontW = true
HookCreateFontIndirectW = true
HookCreateFontIndirectExA = true
HookCreateFontIndirectExW = true
HookGetObjectA = true
HookGetObjectW = true
HookGetTextFaceA = true
HookGetTextFaceW = true
HookGetTextMetricsA = true
HookGetTextMetricsW = true
HookGetCharABCWidthsA = true
HookGetCharABCWidthsW = true
HookGetCharABCWidthsFloatA = true
HookGetCharABCWidthsFloatW = true
HookGetCharWidthA = true
HookGetCharWidthW = true
HookGetCharWidth32A = true
HookGetCharWidth32W = true
HookGetKerningPairsA = true
HookGetKerningPairsW = true
HookGetOutlineTextMetricsA = true
HookGetOutlineTextMetricsW = true
HookAddFontResourceA = true
HookAddFontResourceW = true
HookAddFontResourceExA = true
HookAddFontMemResourceEx = true
HookRemoveFontResourceA = true
HookRemoveFontResourceW = true
HookRemoveFontResourceExA = true
HookRemoveFontMemResourceEx = true
HookEnumFontsA = true
HookEnumFontsW = true
HookEnumFontFamiliesA = true
HookEnumFontFamiliesW = true
HookEnumFontFamiliesExA = true
HookEnumFontFamiliesExW = true
HookGetCharWidthFloatA = true
HookGetCharWidthFloatW = true
HookGetCharWidthI = true
HookGetCharABCWidthsI = true
HookGetTextExtentPointI = true
HookGetTextExtentExPointI = true
HookGetFontData = true
HookGetFontLanguageInfo = true
HookGetFontUnicodeRanges = true
HookDWriteCreateFactory = true
HookGdipCreateFontFamilyFromName = true
HookGdipCreateFontFromLogfontW = true
HookGdipCreateFontFromLogfontA = true
HookGdipCreateFontFromHFONT = false
HookGdipCreateFontFromDC = true
HookGdipCreateFont = true
HookGdipDrawString = true
HookGdipDrawDriverString = true
HookGdipMeasureString = true
HookGdipMeasureCharacterRanges = true
HookGdipMeasureDriverString = true
HookLoadLibraryW = true
HookLoadLibraryExW = true


# ==================== 代码页转换 ====================
[CodePage]
# Enable: 是否启用代码页转换
# 用途：拦截 MultiByteToWideChar / WideCharToMultiByte 做代码页重定向
# 适用：引擎内部依赖 CodePage 而非 Charset 的场景
# 示例：
#   Enable = true
Enable = false

# FromCodePage: 源代码页
# 常见值：
#   932(日文), 936(简中), 950(繁中), 65001(UTF-8)
# 示例：
#   FromCodePage = 932
FromCodePage = 932

# ToCodePage: 目标代码页
# 示例：
#   ToCodePage = 936
ToCodePage = 936


# ==================== 文字替换 ====================
[TextReplace]
# ReplaceCount: 替换规则数量
# 规则编号必须从 0 连续到 ReplaceCount-1（不能跳号）
# 示例：
#   ReplaceCount = 2
ReplaceCount = 0

# ReadEncoding: 读取游戏 ANSI 文本时使用的编码
# WriteEncoding: 写回替换结果时使用的编码
# 如果不区分读写，也可以继续只写旧字段 Encoding，程序会自动把它当作读/写同值
# 常见值：
#   932(日文), 936(简中), 950(繁中), 65001(UTF-8)
# 示例：
#   ReadEncoding = 936
#   WriteEncoding = 936
ReadEncoding = 936
WriteEncoding = 936
# EnableVerboseLog: 详细日志开关
# 用途：
#   打开后记录所有进入文字 Hook 链路的字符串，并做折叠显示
#   同一条字符串默认只记录一次，方便排查该去哪条规则命中
# 注意：
#   - 仅建议排查规则时临时开启，日志量会明显增大
# 示例：
#   EnableVerboseLog = true
EnableVerboseLog = false
# Encoding = 936

# Original_i / Replacement_i: 文本替换规则
# 支持通配符：
#   * = 任意长度字符
#   ? = 单个字符
# 通配符用法（重要）：
#   1) 精确匹配：Original_0 = Start Game
#   2) 包含匹配：Original_1 = *Trial*      （只要包含 Trial 就命中）
#   3) 前缀匹配：Original_2 = Demo*        （以 Demo 开头）
#   4) 后缀匹配：Original_3 = *(测试)       （以“(测试)”结尾）
#   5) 单字符匹配：Original_4 = Ver?        （Ver1/Ver2 可命中，Ver10 不命中）
# 新手易错点：
#   - ReplaceCount 必须与规则数量一致
#   - 编号必须连续，不能跳号（0,1,2...）
#   - 空替换是允许的：Replacement_i 留空可“删除文字”
# 示例：
#   Original_0 = Start Game
#   Replacement_0 = 开始游戏
#   Original_1 = *Trial*
#   Replacement_1 =
# Original_0 =
# Replacement_0 =

# HookTextOutA: Hook TextOutA（ANSI）
# 示例：
#   HookTextOutA = true
HookTextOutA = true

# HookTextOutW: Hook TextOutW（Unicode）
# 示例：
#   HookTextOutW = true
HookTextOutW = true

# HookExtTextOutA: Hook ExtTextOutA（ANSI）
# 示例：
#   HookExtTextOutA = true
HookExtTextOutA = true

# HookExtTextOutW: Hook ExtTextOutW（Unicode）
# 示例：
#   HookExtTextOutW = true
HookExtTextOutW = true

# HookDrawTextA: Hook DrawTextA（ANSI）
# 示例：
#   HookDrawTextA = true
HookDrawTextA = true

# HookDrawTextW: Hook DrawTextW（Unicode）
# 示例：
#   HookDrawTextW = true
HookDrawTextW = true

# HookDrawTextExA: Hook DrawTextExA（ANSI）
# 示例：
#   HookDrawTextExA = true
HookDrawTextExA = true

# HookDrawTextExW: Hook DrawTextExW（Unicode）
# 示例：
#   HookDrawTextExW = true
HookDrawTextExW = true

# 其他文本链路 Hook（完整性配置，默认建议 true）
HookPolyTextOutA = true
HookPolyTextOutW = true
HookTabbedTextOutA = true
HookTabbedTextOutW = true
HookGetTabbedTextExtentA = true
HookGetTabbedTextExtentW = true
HookGetTextExtentPoint32A = true
HookGetTextExtentPoint32W = true
HookGetTextExtentExPointA = true
HookGetTextExtentExPointW = true
HookGetTextExtentPointA = true
HookGetTextExtentPointW = true
HookGetCharacterPlacementA = true
HookGetCharacterPlacementW = true
HookGetGlyphIndicesA = true
HookGetGlyphIndicesW = true
HookGetGlyphOutlineA = true
HookGetGlyphOutlineW = true


# ==================== 窗口标题替换 ====================
[WindowTitle]
# ReplaceCount: 标题替换规则数量
# 示例：
#   ReplaceCount = 1
ReplaceCount = 0

# ReadEncoding: 读取 ANSI 标题时使用的编码
# WriteEncoding: 写回新标题时使用的编码
# 如果不区分读写，也可以继续只写旧字段 Encoding
# 示例：
#   ReadEncoding = 936
#   WriteEncoding = 936
ReadEncoding = 936
WriteEncoding = 936
# EnableVerboseLog: 标题详细日志开关
# 用途：
#   打开后记录所有进入标题 Hook 链路的窗口标题，并做折叠显示
#   同一条标题默认只记录一次；命中替换时也会记录折叠后的命中结果
# 示例：
#   EnableVerboseLog = true
EnableVerboseLog = false
# Encoding = 936

# Original_i / New_i: 标题替换规则
# 规则说明：
#   Original_i 支持 * 与 ? 通配符，命中后替换为 New_i
# 通配符示例：
#   Original_0 = *体験版*     ; 标题里含“体験版”就替换
#   Original_1 = Demo?        ; Demo1/Demo2 命中，Demo10 不命中
# 注意：
#   - New_i 可以是空字符串（清空标题）
#   - 多条规则同时命中时，按编号从小到大处理
# 示例：
#   Original_0 = *体験版*
#   New_0 = 正式版
# Original_0 =
# New_0 =
# 旧写法兼容：
#   OriginalTitle = 旧标题
#   NewTitle = 新标题
# 更早期兼容：
#   [Window]
#   Title = 固定标题

# TitleMode: 标题替换模式
#   0 = API Hook 模式（CreateWindowEx/SetWindowText）
#   1 = 事件监听模式（WinEvent）
#   2 = 混合模式（推荐）
# 示例：
#   TitleMode = 2
TitleMode = 2


# ==================== 启动弹窗 ====================
[StartupMessage]
# Enable: 是否显示启动确认弹窗
# 用途：显示启动说明、免责声明、注意事项；用户点“是”后才继续放行游戏窗口
# 注意：
#   - 弹窗本身使用系统默认 MessageBox 字体，不参与字体 Hook
#   - 弹窗本身也不会参与文字替换与标题替换
#   - Author 和 Text 同时为空时，即使 Enable = true 也会自动关闭
Enable = false

# Style: 弹窗样式
# 取值：
#   1 = 默认旧版样式，只显示 Text
#   2 = 分段样式，显示 Author + Text
# 示例：
#   Style = 1
Style = 1

# Title: 弹窗标题
# 示例：
#   Title = 免责声明
Title = CialloHook

# Author: 作者署名，仅在 Style = 2 时显示在“【补丁作者】”段落
# 示例：
#   Author = 本补丁由GitHub用户Aoi-Namiki制作无偿发布
Author =

# Text: 正文，支持使用 \n 换行
# 说明：
#   - Style = 1 时：直接按旧版样式显示 Text
#   - Style = 2 时：显示在“【补丁声明】”段落
# 示例：
#   Text = 严禁倒卖和移植于任何平台,以及未经许可,\n禁止制作成整合包以及转载搬运至其他平台,\n请勿以任何方式,理由将本补丁用于商业目的,\n若因上述行为触犯法律,本人不承担任何责任
Text =


# ==================== 文件热补丁 ====================
[FilePatch]
# Enable: 是否启用补丁目录优先读取
# 用途：让“补丁目录/补丁封包”里的同名文件覆盖游戏原始文件
# 原理（小白版）：
#   游戏请求读取 A 文件时，先查补丁，再回退原文件
#   查找顺序大致是：PatchFolder -> CustomPak -> 原始文件
# 典型用途：
#   - 汉化资源覆盖（图片、脚本、文本）
#   - MOD 替换（UI、音频、配置）
# 示例：
#   Enable = true   ; 开启补丁系统
Enable = true

# PatchFolderCount: 补丁目录数量
# 与 PatchFolderName_i 个数一致，编号从 0 开始且必须连续
# 新手规则：
#   - Count = 1 只写 PatchFolderName_0
#   - Count = 2 必须写 PatchFolderName_0 和 PatchFolderName_1
# 示例：
#   PatchFolderCount = 2
PatchFolderCount = 1

# PatchFolderName_i: 补丁目录
# 优先级：编号越大优先级越高（后面的覆盖前面）
# 路径建议：
#   - 推荐相对路径（相对游戏目录），如 patch、mods\cn
#   - 可写绝对路径，但迁移到别的电脑不方便
# 多目录示例（高优先级放后面）：
#   PatchFolderName_0 = patch_base
#   PatchFolderName_1 = patch_cn
#   PatchFolderName_2 = patch_hotfix
# 示例：
#   PatchFolderName_0 = patch
#   PatchFolderName_1 = patch_override
PatchFolderName_0 = patch

# CustomPakEnable: 是否启用自定义封包（cpk）
# 用途：除补丁目录外，再额外读取你提供的 CPK 封包
# 原理：和补丁目录一样做“覆盖查找”，只是数据源变成封包
# 示例：
#   CustomPakEnable = true
CustomPakEnable = true

# CustomPakCount: 封包数量
# 与 CustomPakName_i 个数一致，编号从 0 连续
# 新手建议：先从 1 个封包开始，确认生效后再叠加多个
# 示例：
#   CustomPakCount = 2
CustomPakCount = 1

# CustomPakName_i: 封包文件名或路径
# 优先级：编号越大优先级越高
# 支持：
#   - 文件名（如 patch.cpk，默认在游戏目录找）
#   - 相对路径（如 .\mods\patch.cpk）
#   - 绝对路径（如 D:\mods\patch.cpk）
# 叠加示例：
#   CustomPakName_0 = patch_base.cpk
#   CustomPakName_1 = patch_cn.cpk
#   CustomPakName_2 = patch_hotfix.cpk
# 示例：
#   CustomPakName_0 = patch.cpk
#   CustomPakName_1 = patch_hd.cpk
CustomPakName_0 = patch.cpk

# VFSMode: 封包读取模式
#   0 = 物理读取模式（更接近真实文件）
#   1 = 内存读取模式（由内存映射返回）
# 该怎么选：
#   - 不确定时先用 0（兼容优先）
#   - 追求性能或有特殊需求再尝试 1
# 常见现象：
#   - 某些游戏在退出阶段对内存句柄更敏感，0 往往更稳
# 示例：
#   VFSMode = 0
VFSMode = 1

# EnableLog: FilePatch 日志开关
# 用途：输出“命中了哪个补丁文件/封包文件”的日志
# 何时开启：
#   - 你明明放了补丁但游戏没生效
#   - 想确认最终读到的是哪个文件
# 示例：
#   EnableLog = true
EnableLog = false

# DebugMode: FilePatch 调试模式
# 用途：比 EnableLog 更详细，包含更多内部决策信息
# 建议：仅排障时短期开启，日常关闭避免日志过大
# 示例：
#   DebugMode = true
DebugMode = false


# ==================== 文件欺骗 ====================
[FileSpoof]
# Enable: 是否启用文件/目录欺骗
# 原理：拦截文件访问 API，命中规则后“伪装成不存在”
# 适用场景：
#   - 屏蔽某些会触发报错的文件
#   - 隐藏不希望被游戏读取的资源
#   - 临时绕过某些探测逻辑（需自行评估风险）
# 示例：
#   Enable = true
Enable = false

# SpoofFileCount: 伪装文件数量
# 与 SpoofFileName_i 个数一致
# 规则同上：编号必须连续，不能跳号
# 示例：
#   SpoofFileCount = 1
SpoofFileCount = 0

# SpoofFileName_i: 需要隐藏的文件路径
# 建议使用相对路径，统一用 \ 或 / 均可
# 示例场景：
#   - 隐藏授权文件：system\license.dat
#   - 隐藏特定 DLL：plugins\debug_overlay.dll
# 示例：
#   SpoofFileName_0 = system\license.dat
# SpoofFileName_0 =
# 旧写法兼容：
#   SpoofFile_0 = system\license.dat

# SpoofDirectoryCount: 伪装目录数量
# 与 SpoofDirectoryName_i 个数一致
# 目录命中后，该目录下文件访问也会受影响
# 示例：
#   SpoofDirectoryCount = 1
SpoofDirectoryCount = 0

# SpoofDirectoryName_i: 需要隐藏的目录路径
# 示例场景：
#   SpoofDirectoryName_0 = system\secret
#   SpoofDirectoryName_1 = cache\telemetry
# 示例：
#   SpoofDirectoryName_0 = system\secret
# SpoofDirectoryName_0 =
# 旧写法兼容：
#   SpoofDirectory_0 = system\secret

# EnableLog: FileSpoof 日志开关
# 建议：配置规则时先开，确认命中后再关
# 示例：
#   EnableLog = true
EnableLog = false


# ==================== 目录重定向 ====================
[DirectoryRedirect]
# Enable: 是否启用目录重定向
# 用途：将游戏访问的原目录整体改写到另一个目录，适合存档迁移、多开隔离、免权限写入
# 原理：命中规则后，把“原目录及其子路径”的访问重定向到目标目录
# 示例：
#   Enable = true
Enable = false

# EnableLog: DirectoryRedirect 日志开关
# 建议：首次配置或排障时开启，确认命中规则后再关闭
# 示例：
#   EnableLog = true
EnableLog = false

# RuleCount: 重定向规则数量
# 与 Rule_i 个数一致，编号从 0 开始且必须连续
# 示例：
#   RuleCount = 2
RuleCount = 0

# Rule_i: 目录重定向规则
# 格式：
#   原路径:目标文件夹
# 示例：
#   Rule_0 = %APPDATA%\GameCompany\GameName:savedata
#   Rule_1 = %DOCUMENTS%\GameCompany\GameName:save_backup
# 规则说明：
#   - 原路径建议写绝对路径，推荐配合环境变量
#   - 目标文件夹可写绝对路径，也可写相对路径
#   - 相对路径按游戏目录解析，例如 savedata -> 游戏目录\savedata
#   - 命中后会把该目录下所有子文件/子目录一起重定向
# 支持的环境变量：
#   %SAVEDGAMES% = C:\Users\用户名\Saved Games
#   %DOCUMENTS% = C:\Users\用户名\Documents
#   %APPDATA% = C:\Users\用户名\AppData\Roaming
#   %LOCALAPPDATA% = C:\Users\用户名\AppData\Local
#   %USERPROFILE% = C:\Users\用户名
# 示例：
#   Rule_0 = %APPDATA%\GameCompany\GameName:savedata
# Rule_0 =
# 旧写法兼容：
#   RedirectCount + RedirectRule_i
#   SavePathCount + SavePath_i

# ==================== 虚拟注册表 ====================
[Registry]
# Enable: 是否启用虚拟注册表
# 用途：把外部 .reg 文件加载到进程内虚拟层，避免往系统注册表真实写入
# 适用：需要读取安装目录、安装源、序列号等注册表项的免安装游戏
# 示例：
#   Enable = true
Enable = false

# FileCount: 注册表文件数量
# 与 FileName_i 个数一致，编号从 0 开始且必须连续
# 示例：
#   FileCount = 2
FileCount = 1

# FileName_i: .reg 文件路径
# 多文件按顺序叠加，后加载的同名项可覆盖前者
# 要求：
#   1) 必须是标准 Windows Registry Editor Version 5.00 导出格式
#   2) 编码必须为 UTF-16LE
#   3) 相对路径按游戏目录解析
# 示例：
#   FileName_0 = base.reg
#   FileName_1 = config\will\override.reg
FileName_0 = game.reg

# EnableLog: 虚拟注册表日志开关
# 建议：首次接入时开启，确认命中后再关闭
# 示例：
#   EnableLog = true
EnableLog = false

# 最小示例（game.reg 内容）：
#   Windows Registry Editor Version 5.00
#
#   [HKEY_CURRENT_USER\Software\Will]
#   [HKEY_CURRENT_USER\Software\Will\Unskort]
#   "InstallDir"="."
#   "InstallSrc"="."
#
# 兼容说明：
#   旧写法 File = game.reg 仍可继续使用，但建议改为 FileCount + FileName_i


# ==================== 引擎专属配置 ====================
[SiglusKeyExtract]
# Enable: 是否启用 Siglus 密钥提取
# 用途：自动提取 SiglusEngine 常见的 16 字节 XOR 密钥
# 原理（简化）：
#   监控 Gameexe.dat 读取过程，在解密后的关键位置抓取密钥数据
# 适用：仅 SiglusEngine 游戏；非该引擎开启通常无意义
# 示例：
#   Enable = true
Enable = false

# GameexePath: Gameexe.dat 路径
# 建议：
#   - 默认就是 Gameexe.dat 时保持默认
#   - 放在子目录就写相对路径（如 data\Gameexe.dat）
# 示例：
#   GameexePath = Gameexe.dat
GameexePath = Gameexe.dat

# KeyOutputPath: 密钥输出文件路径
# 建议：写到你容易找到的位置，避免权限问题
# 示例：
#   KeyOutputPath = siglus_key.txt
KeyOutputPath = siglus_key.txt

# ShowMessageBox: 是否弹窗提示提取结果
# true 更直观，false 更安静（适合批量测试）
# 示例：
#   ShowMessageBox = true
ShowMessageBox = true

# DebugMode: 提取调试模式
# 会输出更多流程日志，失败排查时开启
# 示例：
#   DebugMode = true
DebugMode = false


# ==================== 全局引擎兼容 ====================
[GLOBAL]
# MED: MED 引擎字体缓存清理
# 原理：在关键时机清理缓存，减少“改了字体但不生效”的情况
# 仅 MED 引擎建议开启，其他引擎通常保持 false
# 示例：
#   MED = true
MED = false

# MAJIRO: MAJIRO 引擎字体缓存清理
# 原理与 MED 类似，仅 MAJIRO 引擎建议开启
# 示例：
#   MAJIRO = true
MAJIRO = false

# EnableKrkrPatch / KrkrPatch: krkrpatch 兼容模式开关
# 兼容旧写法：
#   EnableKrkrPatch = true
#   KrkrPatch = true
# 作用：
#   自动把指定补丁名同时当作“目录”和“同名 xp3”处理
#   若 [FilePatch] 里同时有补丁目录和 patch.cpk，则顺序是
#     patch\name -> patch.cpk\name -> name -> patch\name.xp3 -> patch.cpk\name.xp3 -> name.xp3
#   多个补丁名按配置顺序决定优先级，后写的优先级更高
#   也可显式写链式归档名，如 patch.cpk>inner.xp3，用于读取 cpk 内嵌 xp3
# KrkrPatchVerboseLog:
#   false = 平时只记录实际命中的文件和警告
#   true  = 额外输出 request / miss / fallback / wrap 等完整 krkr 文件流
# KrkrBootstrapBypass:
#   false = 关闭（默认）
#   true  = 尝试应用 FuckBootStrap 风格的 x86 字节特征补丁（仅命中 bootStrap 标记时生效）
# 示例：
#   EnableKrkrPatch = true
#   KrkrPatchVerboseLog = false
#   KrkrBootstrapBypass = true
#   KrkrPatchName = unencrypted
#   KrkrPatchCount = 2
#   KrkrPatchName_1 = unencrypted
#   KrkrPatchName_2 = unencrypted2
#   KrkrPatchName_3 = patch.cpk>inner.xp3
EnableKrkrPatch = false
KrkrPatchVerboseLog = false
KrkrBootstrapBypass = false

# KrkrPatchName: 单个补丁基名
# 可写目录名、相对路径，也可直接写 xp3 名称；写了 .xp3 也会自动去掉扩展名再配对目录
# 若写成 patch.cpk>inner.xp3 这种链式归档名，则会直接把它当成显式归档来源，不再自动补目录名
# 当同时配置 KrkrPatchCount/KrkrPatchName_N 时，优先使用列表写法
KrkrPatchName = unencrypted

# KrkrPatchCount / KrkrPatchName_N: 多个 krkrpatch 补丁名
# 适合 GalPatch 常见的 unencrypted / unencrypted2 / unencrypted3 ... 结构
# 读取优先级示例：
#   KrkrPatchName_1 = unencrypted
#   KrkrPatchName_2 = unencrypted2
# 则实际优先级为：
#   unencrypted2\ > unencrypted\ > unencrypted2.xp3 > unencrypted.xp3
# 注意：
#   目录仍然整体优先于 xp3，因此会先查所有有效目录，再查所有有效 xp3
#KrkrPatchCount = 2
#KrkrPatchName_1 = unencrypted
#KrkrPatchName_2 = unencrypted2

# EnableWafflePatch / WafflePatch: Waffle 引擎兼容补丁开关
# 兼容旧写法：
#   EnableWafflePatch = true
#   WafflePatch = true
# 当前用途：
#   - 修复部分 Waffle 游戏在 GetTextExtentPoint32A 处理制表符时的文本崩溃
# 示例：
#   EnableWafflePatch = true
EnableWafflePatch = false

# WaffleFixGetTextCrash: 是否启用 GetTextExtentPoint32A 制表符崩溃修复
# 通常保持 true；只有需要排查兼容性时再临时关闭
WaffleFixGetTextCrash = true


# ==================== Locale Emulator 转区 ====================
[LocaleEmulator]
# Enable: 是否启用转区并重启进程
# 依赖：LoaderDll.dll 与 LocaleEmulator.dll
# 兼容旧写法：
#   CodePage <=> AnsiCodePage / OemCodePage
#   Charset  <=> DefaultCharset
# 原理（小白版）：
#   先退出当前进程，再用指定区域参数重新拉起游戏
#   这样游戏“以为”自己运行在目标地区环境
# 典型用途：
#   - 日文游戏在中文系统乱码
#   - 程序硬性检查系统区域/语言
# 示例：
#   Enable = true
Enable = false

# CodePage: 代码页（兼容旧写法）
# 常见：
#   932(日文), 936(简中), 950(繁中)
# 小白建议：
#   - 日文游戏常用 932
#   - 简中游戏常用 936
# 示例：
#   CodePage = 932
CodePage = 932
# 需要更细分时，也可以改用：
#   AnsiCodePage = 932
#   OemCodePage = 932
# 新写法推荐（与上面等效，可二选一）：
# AnsiCodePage = 932
# OemCodePage = 932

# LocaleID: 区域 ID（十六进制）
# 例：0x411=日语(日本)
# 常见：
#   0x411 = 日语(日本)
#   0x804 = 中文(中国)
#   0x404 = 中文(台湾)
# 示例：
#   LocaleID = 0x411
LocaleID = 0x411

# Charset: 默认字符集（兼容旧写法）
# 常见：
#   128=SHIFTJIS_CHARSET
#   134=GB2312_CHARSET
#   136=CHINESEBIG5_CHARSET
# 与区域建议：
#   - 日文组合常见：932 + 0x411 + 128
#   - 简中组合常见：936 + 0x804 + 134
# 示例：
#   Charset = 128
Charset = 128
# 若需新写法，也可以改用：
#   DefaultCharset = 128
# 新写法推荐（与上面等效，可二选一）：
# DefaultCharset = 128

# HookUILanguageAPI: 是否 Hook UI 语言相关 API
#   0 = 关闭
#   1 = 启用
# 什么时候开 1：
#   - 游戏仍读取到系统 UI 语言，导致文本/资源分支不对
# 不确定时先 0，出问题再开 1 测试
# 示例：
#   HookUILanguageAPI = 1
HookUILanguageAPI = 0

# Timezone: 时区名称（需为系统可识别名称）
# 作用：部分游戏会按时区决定资源/活动时间/区域分支
# 常见值：
#   Tokyo Standard Time（东京）
#   China Standard Time（中国）
# 示例：
#   Timezone = Tokyo Standard Time
#   Timezone = China Standard Time
Timezone = Tokyo Standard Time


# ==================== 加载模式 ====================
[LoadMode]
# Mode: 加载方式
#   proxy  = 代理模式（winmm/version，推荐）
#   loader = 启动器模式（由 CialloLauncher 注入）
# 原理：
#   - proxy：把本 DLL 伪装成系统 DLL，让游戏启动时自动加载
#   - loader：先启动 CialloLauncher，再由它创建进程并注入
# 怎么选：
#   - 新手优先 proxy（最省事）
#   - 需要多 DLL 或特殊启动参数时用 loader
# 示例：
#   Mode = proxy
Mode = proxy


# ==================== 启动器配置 ====================
[CialloLauncher]
# DebugMode: 启动器调试模式
# 开启后会输出启动与注入流程日志
# 示例：
#   DebugMode = true
DebugMode = false

# TargetEXE: 目标 EXE 名称或路径
# 规则：
#   - 可写文件名（game.exe）或完整路径
#   - 写文件名时默认在当前目录查找
# 示例：
#   TargetEXE = game.exe
#   TargetEXE = sorakoi.exe
TargetEXE = game.exe

# TargetDLLCount: 注入 DLL 数量
# 与 TargetDLLName_i 个数一致
# 新手建议：
#   - 先只注入 1 个确认稳定，再加其他 DLL
# 示例：
#   TargetDLLCount = 2
TargetDLLCount = 1

# TargetDLLName_i: 第 i 个注入 DLL
# 加载顺序：按编号从小到大
# 常见用途：
#   - 0 放 CialloHook.dll
#   - 后续放你自己的插件 DLL
# 示例：
#   TargetDLLName_0 = CialloHook.dll
#   TargetDLLName_1 = MyPatch.dll
TargetDLLName_0 = CialloHook.dll


# ==================== 调试日志 ====================
[Debug]
# Enable: 总日志开关
#   true  = 启用日志
#   false = 关闭日志
# 示例：
#   Enable = true
Enable = true

# LogToFile: 是否写入日志文件
# 一般输出到游戏目录或当前工作目录
# 小白建议：排障时开，日常可开可关
# 示例：
#   LogToFile = true
LogToFile = true

# LogToConsole: 是否输出到控制台窗口
# 控制台窗口会影响全屏游戏体验，日常通常关闭
# 但排障时打开更直观
# 示例：
#   LogToConsole = false
LogToConsole = true
