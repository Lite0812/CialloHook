# ============================================================
#  CialloHook 配置文件 (UTF-8 编码)
#  支持: winmm.dll / version.dll 代理加载 / CialloLauncher.exe 辅助加载
# ============================================================

# ======================== 字体设置 ========================
[CialloHook]
# 字符集编码: 0x86(简中), 0x88(繁中), 0x80(日文), 0x00(默认)
Charset = 0x00

# 字体名称或路径（留空则不 Hook 字体）
#   系统字体: SimHei, Microsoft YaHei, SimSun, NSimSun, KaiTi, FangSong
#   外部字体: C:\Fonts\xxx.ttf 或 .\fonts\xxx.otf
#   仅填文件名时优先在目录找，找不到再去自定义封包找
#   识别后缀: .ttf .otf .ttc .otc .fon .fnt
Font = SimHei

# 外部字体的实际名称（可选，仅当文件名与字体名不同时需要）
# FontName = Source Han Sans CN Regular

# 命中这些原始字体名时，不进行字体 Hook（支持多条，大小写不敏感）
# 优先级高于下面的重定向规则；编号从 0 开始连续递增
SkipFontCount = 0
# SkipFontName_0 = MS Gothic
# SkipFontName_1 = Arial

# 命中这些原始字体名时，改 Hook 到指定目标字体（支持多条）
# 目标字体写法与上面的 Font 一致，可写系统字体名或字体文件路径
# 若目标是字体文件且内部名称与文件名不同，可额外写 RedirectToFontName_i
RedirectFontCount = 0
# RedirectFromFont_0 = MS UI Gothic
# RedirectToFont_0 = Microsoft YaHei
# RedirectFromFont_1 = Arial
# RedirectToFont_1 = .\fonts\SourceHanSansCN-Regular.otf
# RedirectToFontName_1 = Source Han Sans CN Regular

# EnableCharsetSpoof: 条件伪装字符集；仅在原始字符集等于 SpoofFromCharset 时替换为 SpoofToCharset
EnableCharsetSpoof = true
SpoofFromCharset = 0x80
SpoofToCharset = 0x01

# 可选：日繁映射，启用后会读取映射 json，在字形查询、字宽计算和实际绘制阶段把右值字符映射到左值字形
# 例如 json 中 "头": "頭" 时，字体请求 "頭" 的字形时会改取 "头" 的字形
EnableCnJpMap = false
CnJpMapVerboseLog = false
CnJpMapJson = subs_cn_jp.json
# 常见值: 932(日文), 936(简中), 950(繁中), 65001(UTF-8)
CnJpMapReadEncoding = 932

# 字体选择解锁开关：true=枚举时不过滤字体/字符集（可看到更多字体），false=按上面的字体与字符集约束
# 作用于全部字体枚举 API（EnumFonts / EnumFontFamilies / EnumFontFamiliesEx，含 A/W）
# 仅在对应枚举 Hook 开启时生效（受 HookGroupEnumerate 与单 API 开关共同控制）
UnlockFontSelection = true

# ---------- 字体尺寸调整 ----------
# FontHeight: 字体高度（负数: 字符高度，如 -16 表示 16 点字体；正数: 单元高度；0=不固定）
# FontWidth:  字体宽度（0=不固定，沿用原始宽度/由引擎决定；>0=强制固定宽度）
#             常用建议：先只改 FontHeight，再按需微调 FontWidth；过大可能导致字间拥挤
# FontScale:  字体大小缩放倍数（1.0=不缩放；FontHeight不为0时无效）
# FontSpacingScale: 字符间距缩放倍数（1.0=不调整；仅影响字符间距，不拉伸字形宽度）
# FontWeight: 粗细（0=不改, 400=正常, 700=粗体）
# GlyphAspectRatio: 字形宽高比缩放（在以上全部调整后应用；1.0=不调整，>1更宽，<1更窄）
FontHeight = 0
FontWidth = 0
FontScale = 1.0
FontSpacingScale = 1.0
FontWeight = 0
GlyphAspectRatio = 1.0
# ---------- 字形调整（可能不生效） ----------
# GlyphOffsetX: 字形左右平移（左负右正，单位：像素）
# GlyphOffsetY: 字形上下平移（上正下负，单位：像素）
# MetricsOffsetLeft: 度量左侧补偿（正数=增大左留白，负数=减小左留白）
# MetricsOffsetRight: 度量右侧补偿（正数=增大右留白，负数=减小右留白）
# MetricsOffsetTop: 度量顶部补偿（正数=给上方更多空间，负数=减少上方空间）
# MetricsOffsetBottom: 度量底部补偿（正数=给下方更多空间，负数=减少下方空间）
GlyphOffsetX = 0
GlyphOffsetY = 0
MetricsOffsetLeft = 0
MetricsOffsetRight = 0
MetricsOffsetTop = 0
MetricsOffsetBottom = 0

# ---------- API Hook 分组开关 ----------
# HookGroupCreate: 字体创建链路（CreateFont / CreateFontIndirect / CreateFontIndirectEx）
# HookGroupEnumerate: 字体枚举链路（EnumFonts / EnumFontFamilies / EnumFontFamiliesEx）
# HookGroupMetrics: 字体度量链路（GetTextMetrics / GetCharWidth* / GetFontUnicodeRanges 等）
# HookGroupResource: 字体资源链路（Add/RemoveFontResource* / Add/RemoveFontMemResourceEx）
# HookGroupModern: 现代字体链路（DWrite + GDI+ 相关创建/测量 API）
# HookGroupLateLoad: 延迟加载补钩链路（LoadLibraryW / LoadLibraryExW 后自动尝试补挂 dwrite/gdiplus）
HookGroupCreate = true
HookGroupEnumerate = true
HookGroupMetrics = true
HookGroupResource = true
HookGroupModern = true
HookGroupLateLoad = true
# ---------- 单 API 覆盖（按需添加，不写则跟随分组） ----------
HookCreateFontA = true
HookCreateFontIndirectA = true
HookCreateFontW = true
HookCreateFontIndirectW = true
HookEnumFontFamiliesExA = true
HookEnumFontFamiliesExW = true
HookDWriteCreateFactory = true
HookGdipCreateFontFamilyFromName = true
HookGdipCreateFontFromLogfontW = true
HookGdipMeasureDriverString = true

# ======================== 代码页转换 ========================
[CodePage]
# 将源代码页转换为目标代码页（Hook MultiByteToWideChar / WideCharToMultiByte）
# 适用于需要修改 CodePage 而非 Charset 的游戏引擎
Enable = false
FromCodePage = 932
ToCodePage = 936

# ======================== 文字替换 ========================
[TextReplace]
# 检测并替换显示的文字，支持通配符 * 和 ?
# ReadEncoding: 读取游戏 ANSI 文本时使用的编码
# WriteEncoding: 写回替换结果时使用的编码
# EnableVerboseLog: 输出可被文字 Hook 捕获到的字符串（折叠显示，同一条不重复刷屏）
# 常见值: 932(日文), 936(简中), 950(繁中), 65001(UTF-8)
ReplaceCount = 0
ReadEncoding = 936
WriteEncoding = 936
EnableVerboseLog = false
# Original_0 = 原始文字
# Replacement_0 = 替换文字

# ReplaceCount: 替换规则数量，需与下面条目数量一致（从 0 开始连续编号）
# 条目格式:
#   Original_0 = 原始文字
#   Replacement_0 = 替换文字
#   Original_1 = 原始文字2
#   Replacement_1 = 替换文字2
# 说明:
#   1) 支持通配符 * 和 ?
#   2) 编号必须连续（0开始直到ReplaceCount-1）

# API Hook 开关（可选，默认全部启用）
HookTextOutA = true
HookTextOutW = true
HookExtTextOutA = true
HookExtTextOutW = true
HookDrawTextA = true
HookDrawTextW = true
HookDrawTextExA = true
HookDrawTextExW = true

# ======================== 窗口标题替换 ========================
[WindowTitle]
# 替换窗口标题，支持通配符 * 和 ?
# EnableVerboseLog: 输出可被标题 Hook 捕获到的标题（折叠显示，同一条不重复刷屏）
ReplaceCount = 0
# ReadEncoding: 读取原始 ANSI 标题时使用的编码
# WriteEncoding: 写回新标题时使用的编码
ReadEncoding = 936
WriteEncoding = 936
EnableVerboseLog = false
# Original_0 = 原始标题
# New_0 = 新标题

TitleMode = 2
# 0 = API Hook模式（CreateWindowEx/SetWindowText）
# 1 = 事件监听模式（Windows事件驱动）
# 2 = 混合模式（推荐）

# ======================== 文件热补丁 ========================
[FilePatch]
# 游戏读取文件时优先从补丁文件夹查找
# 用途: 汉化补丁、资源替换、MOD安装
Enable = true
PatchFolderCount = 1
PatchFolderName_0 = patch
# 可配置多个补丁目录，越后面优先级越高
# PatchFolderName_1 = patch_override

CustomPakEnable = true
CustomPakCount = 1
CustomPakName_0 = patch.cpk
# CustomPakEnable: 是否启用自定义封包
# 可配置多个封包，越后面优先级越高
# CustomPakName_1 = patch2.cpk

# VFS读取模式
# 0 ：物理读取模式
# 1 ：内存读取模式
VFSMode = 1
EnableLog = false
DebugMode = false

# ======================== 文件欺骗 ========================
[FileSpoof]
# 命中后返回文件不存在，欺骗调用者文件不存在
Enable = false
SpoofFileCount = 0
# 可配置多个需要隐藏的文件
# SpoofFileName_0 = system/license.dat

SpoofDirectoryCount = 0
# 可配置多个需要隐藏的文件夹
# SpoofDirectoryName_0 = system/secret
EnableLog = false

# ======================== 目录重定向 ========================
[DirectoryRedirect]
# 将命中的原目录重定向到目标目录，适合存档迁移等场景
Enable = false
EnableLog = false

# 规则数量，编号从 0 开始连续递增
RuleCount = 0

# 格式：原路径:目标文件夹
# 支持的环境变量：
# %SAVEDGAMES% %DOCUMENTS% %APPDATA% %LOCALAPPDATA% %USERPROFILE%
# 目标路径可写相对路径，相对游戏目录解析
# Rule_0 = %APPDATA%\GameCompany\GameName:savedata
# Rule_1 = %DOCUMENTS%\GameCompany\GameName:save_backup

# ======================== 虚拟注册表 ========================
[Registry]
# 将外部 .reg 文件加载到进程内虚拟注册表层，实现免安装运行
# 注意：
#   1) .reg 文件必须保存为 UTF-16LE
#   2) 文件内容必须是标准 Windows Registry Editor Version 5.00 导出格式
#   3) 相对路径按游戏目录解析
#   4) 多文件按顺序叠加，后加载的同名项可覆盖前者
Enable = false
FileCount = 0
# FileName_0 = game.reg
EnableLog = false

# ======================== 引擎专属配置 ========================
[SiglusKeyExtract]
# Siglus 密钥提取
# 自动提取 SiglusEngine 游戏的 16 字节 XOR 密钥
# 原理: 监控 Gameexe.dat 读取，用硬件断点捕获解密后的数据
# 用途: 解密 Scene.pck 等资源
Enable = false
GameexePath = Gameexe.dat
KeyOutputPath = siglus_key.txt
ShowMessageBox = true
DebugMode = false

[GLOBAL]
# MED引擎专用。自动清除MED引擎字体缓存
MED = false
# majiro引擎专用。自动清除majiro引擎字体缓存
MAJIRO = false

# krkrpatch补丁。开启后会倒序检查 KrkrPatchName_* 列表，后配置的名字优先级更高；同名目录优先于同名xp3
# KrkrPatchCount = 0 时不自动回退 unencrypted；只按你显式配置的列表处理
# 若 [FilePatch] 已启用补丁目录且已配置 CustomPakName=patch.cpk 之类的封包，则查找顺序为
#   patch\name -> patch.cpk\name -> name -> patch\name.xp3 -> patch.cpk\name.xp3 -> name.xp3
# KrkrPatchVerboseLog: 是否输出完整 krkr 文件流日志；关闭时默认只显示实际命中的文件和警告
EnableKrkrPatch = false
KrkrPatchVerboseLog = false
KrkrPatchCount = 1
KrkrPatchName_0 = unencrypted

# KrkrBootstrapBypass: krkrz 过 BootStrap 的补丁；仅在检测到 bootStrap 标记时尝试应用
KrkrBootstrapBypass = false

# Waffle引擎兼容补丁。当前包含GetTextExtentPoint32A制表符崩溃修复
EnableWafflePatch = false

# ======================== Locale Emulator 转区 ========================
# proxy 模式下由 winmm.dll / version.dll 直接重启转区；loader 模式下继续由 CialloLauncher 处理
# 需要 LoaderDll.dll 和 LocaleEmulator.dll
[LocaleEmulator]
# Enable: true=启用转区并重启进程，false=关闭
Enable = false
# AnsiCodePage / OemCodePage: 目标区域代码页；一般两者保持一致
# 常用：932=日文，936=简中，950=繁中
AnsiCodePage = 932
OemCodePage = 932
# LocaleID: 区域 ID（十六进制），0x411=日语(日本)
LocaleID = 0x411
# 常见：128=SHIFTJIS_CHARSET，134=GB2312_CHARSET，136=CHINESEBIG5_CHARSET
DefaultCharset = 128
# HookUILanguageAPI: 1=同时 Hook UI 语言相关 API，0=不 Hook
HookUILanguageAPI = 0
# Timezone: 时区名称（需与系统可识别时区名一致）
Timezone = Tokyo Standard Time

# ======================== 启动弹窗 ========================
[StartupMessage]
# 启动时显示一个确认弹窗；点击“是”后才继续放行游戏窗口
# 弹窗使用系统默认 MessageBox 字体，不参与字体 Hook / 标题替换 / 文字替换
Enable = false
# Style: 弹窗样式
#   1 = 旧版样式，只显示 Text
#   2 = 分段样式，显示 Author + Text
Style = 1
Title = CialloHook
# 作者署名，可留空
Author =
# 正文，支持使用 \n 换行
Text = 

# ======================== 加载模式 ========================
[LoadMode]
# proxy:  winmm.dll / version.dll 代理模式（推荐，直接运行游戏）
# loader: CialloLauncher.exe 辅助模式（支持多DLL注入）
Mode = proxy

# ======================== CialloLauncher 配置 ========================
# 仅在 Mode = loader 时生效
[CialloLauncher]
DebugMode = false
TargetEXE = game.exe
TargetDLLCount = 1
TargetDLLName_0 = CialloHook.dll

# ======================== 调试日志 ========================
[Debug]
# Enable: true=启用调试日志系统，false=关闭日志输出
Enable = true

# LogToFile: true=写入日志文件（通常在游戏目录下），false=不写文件
LogToFile = true

# LogToConsole: true=输出到控制台窗口，false=不输出到控制台
LogToConsole = true


